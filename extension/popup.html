<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{--bg:#fcfcfb;--panel:#fff;--ink:#161613;--muted:#5f5f58;--line:#e6e6e1;--accent:#161613;--hit:#c62f42;--hit-soft:#fbe9ec;--code:#f2f2ee;--on:#fcfcfb}
  @media (prefers-color-scheme:dark){:root{--bg:#0e0e0d;--panel:#161615;--ink:#efefe9;--muted:#9c9c92;--line:#282824;--accent:#efefe9;--hit:#ff6b7c;--hit-soft:#331319;--code:#1a1a18;--on:#0e0e0d}}
  *{box-sizing:border-box}
  body{width:340px;margin:0;padding:14px;background:var(--bg);color:var(--ink);font:13.5px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  h1{font-size:14px;margin:0 0 2px;font-weight:700}
  .sub{color:var(--muted);font-size:11.5px;margin:0 0 10px}
  textarea{width:100%;min-height:84px;resize:vertical;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);padding:10px;font:12.5px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  textarea:focus{outline:2px solid var(--accent);outline-offset:1px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:9px}
  button{padding:8px 14px;border-radius:8px;font-weight:650;font-size:12.5px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer}
  button.primary{background:var(--accent);color:var(--on);border-color:var(--accent)}
  button:disabled{opacity:.5;cursor:default}
  label.opt{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);cursor:pointer;margin-top:8px}
  #summary{margin-top:10px;font-size:12.5px}
  .verdict{font-weight:700}
  .verdict.clean{color:#12a150}.verdict.dirty{color:var(--hit)}
  #chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .chip{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 8px;color:var(--muted)}
  .chip b{color:var(--ink)}
  #out{margin-top:9px;background:var(--code)}
  .hint{font-size:11px;color:var(--muted);margin-top:8px}
  .links{display:flex;gap:8px;margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
  .links a{flex:1;text-align:center;text-decoration:none;font-weight:600;font-size:11.5px;padding:7px;border-radius:7px}
  .kofi{background:#FF5E5B;color:#fff}
  .gh{background:var(--code);color:var(--ink)}
</style>
</head>
<body>
  <h1>Invisibles</h1>
  <p class="sub">Reveal &amp; strip hidden characters. Runs offline — nothing leaves your browser.</p>
  <textarea id="in" placeholder="Paste text here…" spellcheck="false" autocomplete="off"></textarea>
  <div class="row">
    <button id="clean" class="primary" disabled>Clean it</button>
    <button id="copy" hidden>Copy clean text</button>
  </div>
  <label class="opt"><input type="checkbox" id="norm"> normalize smart quotes / em-dashes to ASCII</label>
  <div id="summary"></div>
  <div id="chips"></div>
  <textarea id="out" readonly spellcheck="false" hidden></textarea>
  <div class="hint" id="delta"></div>
  <div class="links">
    <a class="kofi" href="https://ko-fi.com/jju1s" target="_blank" rel="noopener">☕ Ko-fi</a>
    <a class="gh" href="https://github.com/cig13zs/invisibles" target="_blank" rel="noopener">GitHub</a>
  </div>

<script src="core.js"></script>
<script>
(function(){
  var I=window.Invisibles;
  var inEl=document.getElementById('in'),cleanBtn=document.getElementById('clean'),
      copyBtn=document.getElementById('copy'),norm=document.getElementById('norm'),
      summary=document.getElementById('summary'),chips=document.getElementById('chips'),
      out=document.getElementById('out'),delta=document.getElementById('delta');

  function render(){
    var text=inEl.value, r=I.scan(text);
    cleanBtn.disabled=!text||(r.total===0&&!norm.checked);
    if(!text){summary.innerHTML='';chips.innerHTML='';return;}
    if(r.total===0){
      summary.innerHTML='<span class="verdict clean">Clean.</span> No hidden characters.'+(norm.checked?' Punctuation will still be normalized.':'');
      chips.innerHTML='';return;
    }
    summary.innerHTML='<span class="verdict dirty">'+r.total+' hidden character'+(r.total>1?'s':'')+'</span> found.';
    var cats=Object.keys(r.counts).sort();
    chips.innerHTML=cats.map(function(c){
      var label=(I.CATEGORIES[c]||c).split(' — ')[0];
      return '<span class="chip"><b>'+r.counts[c]+'</b> '+label+'</span>';
    }).join('');
  }
  function doClean(){
    var t=I.clean(inEl.value);
    if(norm.checked) t=I.normalizePunctuation(t);
    out.value=t; out.hidden=false; copyBtn.hidden=false;
    var d=inEl.value.length-t.length;
    delta.textContent=d>0?(d+' character'+(d===1?'':'s')+' removed.'):'Punctuation normalized.';
  }
  copyBtn.addEventListener('click',function(){
    navigator.clipboard.writeText(out.value).then(function(){
      var o=copyBtn.textContent;copyBtn.textContent='Copied ✓';setTimeout(function(){copyBtn.textContent=o;},1300);
    }).catch(function(){out.select();document.execCommand('copy');});
  });
  inEl.addEventListener('input',render);
  norm.addEventListener('change',render);
  cleanBtn.addEventListener('click',doClean);
  render();
})();
</script>
</body>
</html>
